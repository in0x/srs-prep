<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- PWA / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Recall·Queue" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1F3864" />

  <title>Recall·Queue</title>
  <link rel="manifest" href="/srs-prep/manifest.json" />
  <link rel="apple-touch-icon" href="/srs-prep/icon-192.png" />

  <!-- Import map: resolve bare React imports to esm.sh -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1?dev=false",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?dev=false",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime?dev=false"
    }
  }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #E7ECF1;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
      /* Safe area for iPad notch/home indicator */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    #root { min-height: 100%; }

    /* Tailwind-compatible flex utilities (the app uses className="flex ...") */
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .flex-1 { flex: 1 1 0%; }
    .items-center { align-items: center; }
    .items-baseline { align-items: baseline; }
    .items-start { align-items: flex-start; }
    .justify-between { justify-content: space-between; }
    .mx-auto { margin-left: auto; margin-right: auto; }

    /* Splash screen */
    #splash {
      position: fixed; inset: 0;
      background: #1F3864;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      transition: opacity 0.3s ease;
      z-index: 9999;
    }
    #splash h1 {
      color: #FBFCFD; font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
    }
    #splash .dot { color: #4338CA; }
    #splash p { color: #8595A6; font-size: 14px; }
    #splash.hidden { opacity: 0; pointer-events: none; }

    /* Spinner */
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #2F5496;
      border-top-color: #FBFCFD;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Touch targets — slightly larger on iPad */
    button { min-height: 44px; touch-action: manipulation; }
    input, select, textarea { min-height: 44px; }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D5DDE5; border-radius: 2px; }
  </style>
</head>
<body>
  <!-- Splash shown while React hydrates -->
  <div id="splash">
    <div class="spinner"></div>
    <h1>Recall<span class="dot">·</span>Queue</h1>
    <p>Loading your deck…</p>
  </div>

  <div id="root"></div>

  <script type="module" src="/srs-prep/app.js"></script>

  <script>
    // Hide splash once React has mounted
    window.__hideSplash = function() {
      const s = document.getElementById('splash');
      if (s) { s.classList.add('hidden'); setTimeout(() => s.remove(), 350); }
    };

    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/srs-prep/sw.js', { scope: '/srs-prep/' })
          .then(r => console.log('SW registered, scope:', r.scope))
          .catch(e => console.warn('SW failed:', e));
      });
    }
  </script>
</body>
</html>
